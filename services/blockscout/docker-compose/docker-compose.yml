version: '3.9'

services:
  redis-db:
    extends:
      file: ./services/redis.yml
      service: redis-db

  db-init:
    extends:
      file: ./services/db.yml
      service: db-init

  db:
    depends_on:
      db-init:
        condition: service_completed_successfully
    extends:
      file: ./services/db.yml
      service: db

  backend:
    depends_on:
      - db
      - redis-db
    extends:
      file: ./services/backend.yml
      service: backend
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
      args:
        RELEASE_VERSION: 9.0.2
    links:
      - db:database
    environment:
        ETHEREUM_JSONRPC_HTTP_URL: http://host.docker.internal:8545/
        ETHEREUM_JSONRPC_TRACE_URL: http://host.docker.internal:8545/
        ETHEREUM_JSONRPC_WS_URL: ws://host.docker.internal:8545/
        CHAIN_ID: '49406'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  nft_media_handler:
    depends_on:
      - backend
    extends:
      file: ./services/nft_media_handler.yml
      service: nft_media_handler
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
      args:
        RELEASE_VERSION: 9.0.2

  visualizer:
    extends:
      file: ./services/visualizer.yml
      service: visualizer

  sig-provider:
    extends:
      file: ./services/sig-provider.yml
      service: sig-provider

  frontend:
    depends_on:
      - backend
    extends:
      file: ./services/frontend.yml
      service: frontend

  stats-db-init:
    extends:
      file: ./services/stats.yml
      service: stats-db-init

  stats-db:
    depends_on:
      stats-db-init:
        condition: service_completed_successfully
    extends:
      file: ./services/stats.yml
      service: stats-db

  stats:
    depends_on:
      - stats-db
      - backend
    extends:
      file: ./services/stats.yml
      service: stats

  user-ops-indexer:
    depends_on:
      - db
      - backend
    extends:
      file: ./services/user-ops-indexer.yml
      service: user-ops-indexer

  proxy:
    depends_on:
      - backend
      - frontend
      - stats
    extends:
      file: ./services/nginx.yml
      service: proxy

  certbot:
    image: certbot/certbot
    volumes:
      - /root/certbot/conf:/etc/letsencrypt
      - /root/certbot/www:/var/www/certbot

  cyberia_church:
    build: /root/singularity/backend/laravel
    container_name: cyberia_church
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - /root/singularity/backend/laravel:/var/www/html
      - /root/singularity:/singularity
      - /root/.config/solana:/solana
    command: >
      sh -lc "if [ ! -f vendor/autoload.php ]; then
        composer install --no-interaction --prefer-dist --no-progress;
      fi &&
      if [ ! -f public/build/manifest.json ]; then
        npm install && npm run build;
      fi &&
      if [ ! -d /singularity/crypto/hardhat/node_modules/dotenv ]; then
        npm ci --prefix /singularity/crypto/hardhat;
      fi &&
      if [ ! -d /singularity/crypto/anchor/node_modules/@coral-xyz ]; then
        npm ci --prefix /singularity/crypto/anchor;
      fi &&
      php artisan serve --host=0.0.0.0 --port=9001"
    ports:
      - "9001:9001"
    env_file:
      - /root/singularity/backend/laravel/.env
    environment:
      APP_URL: https://bridge.cyberia.church
      ASSET_URL: https://bridge.cyberia.church

  polygon-edge:
    image: 0xpolygon/polygon-edge:latest
    container_name: polygon-edge
    restart: unless-stopped
    user: "0:0"
    volumes:
      - /root/polygon-edge-validators:/data
      - /root/id/docker/polygon-edge/genesis.json:/genesis.json:ro
    ports:
      - "8545:8545"
      - "8546:8546"
      - "1337:1337"
    environment:
      - POLYGON_EDGE_DATA_DIR=/data
    command: >
      server
      --data-dir=/data
      --chain=/genesis.json
      --jsonrpc=0.0.0.0:8545
      --access-control-allow-origins=*
      --json-rpc-block-range-limit=1000
      --block-gas-target=0x1C9C380
      --libp2p=0.0.0.0:1337
      --seal
      --price-limit=1000000000
